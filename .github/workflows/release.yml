name: CI

on:
  push:
    branches:
      - main
      - next
    paths:
      - 'packages/**'
      - 'tooling/**'
      - 'package.json'
      - '.github/actions/**'
      - '.github/workflows/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'biome.jsonc'
      - 'eslint*'
      - 'bunfig.toml'
      - 'tsconfig.json'
      - 'turbo.json'
      - 'config'
      - 'scripts'
      - 'patches'
      - '.changeset/**'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'packages/**'
      - 'tooling/**'
      - 'package.json'
      - '.github/actions/**'
      - '.github/workflows/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'biome.jsonc'
      - 'eslint*'
      - 'bunfig.toml'
      - 'tsconfig.json'
      - 'turbo.json'
      - 'config'
      - 'scripts'
      - 'patches'

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    if: >-
      (github.event_name != 'pull_request' || github.event.pull_request.title != '[Release] Version packages') &&
      (github.event_name != 'push' || (
        github.event.head_commit.message != 'Version Packages' &&
        !contains(github.event.head_commit.message, '[skip ci]')
      ))

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.API_TOKEN_GITHUB || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📥 Monorepo install
        uses: ./.github/actions/pnpm-install

      - name: ♻️ Restore packages cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache
            ${{ github.workspace }}/**/tsconfig.tsbuildinfo
          key: packages-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: 🧱 Generate barrels
        run: pnpm brl

      - name: 🔍 Detect barrel changes
        id: barrel-changes
        run: |
          if [[ -n "$(git status --porcelain --untracked-files=all -- packages)" ]]; then
            git status --short -- packages
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: ❌ Fail on barrel drift in PR
        if: ${{ github.event_name == 'pull_request' && steps.barrel-changes.outputs.changed == 'true' }}
        run: |
          echo "pnpm brl produced changes. Commit the generated barrel updates."
          exit 1

      - name: ✅ Check
        run: bun check

      - name: 🔧 Configure git
        if: ${{ github.event_name == 'push' && steps.barrel-changes.outputs.changed == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: ⬆️ Push barrel updates
        if: ${{ github.event_name == 'push' && steps.barrel-changes.outputs.changed == 'true' }}
        run: |
          git add packages
          git commit -m "chore: sync barrels [skip ci] [skip release]"
          git push origin HEAD:${{ github.ref_name }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 15
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      (needs.ci.result == 'success' || needs.ci.result == 'skipped') &&
      (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip release]'))
      )

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if release is needed
        id: check
        run: |
          CHANGESETS=$(find .changeset -name "*.md" ! -name "README.md" 2>/dev/null | wc -l)
          IS_VERSION_COMMIT=false
          if [[ "${{ github.event.head_commit.message }}" == "Version Packages"* ]]; then
            IS_VERSION_COMMIT=true
          fi
          IS_MANUAL=${{ github.event_name == 'workflow_dispatch' }}

          if [[ "$CHANGESETS" -gt 0 ]] || [[ "$IS_VERSION_COMMIT" == "true" ]] || [[ "$IS_MANUAL" == "true" ]]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "Release needed: changesets=$CHANGESETS version_commit=$IS_VERSION_COMMIT manual=$IS_MANUAL"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "No changesets, not a version commit, not manual — skipping release"
          fi

      - name: Setup git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        env:
          HUSKY: '0'

      - name: Convert upstream changesets
        run: node scripts/convert-changesets.mjs

      - name: Build
        run: pnpm turbo build --filter "./packages/**"

      - name: Create Release Pull Request or Publish
        if: steps.check.outputs.needed == 'true'
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
