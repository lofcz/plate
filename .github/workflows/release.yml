name: Release

on:
  push:
    branches:
      - main
      - next
    paths:
      - 'packages/**'
      - 'tooling/**'
      - 'package.json'
      - '.github/actions/**'
      - '.github/workflows/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'biome.jsonc'
      - 'eslint*'
      - 'bunfig.toml'
      - 'tsconfig.json'
      - 'turbo.json'
      - 'config'
      - 'scripts'
      - 'patches'
      - '.changeset/**'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - 'packages/**'
      - 'tooling/**'
      - 'package.json'
      - '.github/actions/**'
      - '.github/workflows/**'
      - 'pnpm-workspace.yaml'
      - 'pnpm-lock.yaml'
      - 'biome.jsonc'
      - 'eslint*'
      - 'bunfig.toml'
      - 'tsconfig.json'
      - 'turbo.json'
      - 'config'
      - 'scripts'
      - 'patches'

  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    if: >-
      (github.event_name != 'pull_request' || github.event.pull_request.title != '[Release] Version packages') &&
      (github.event_name != 'push' || (
        github.event.head_commit.message != 'Version Packages' &&
        !contains(github.event.head_commit.message, '[skip ci]')
      ))

    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔎 Detect auto-release opt-in
        id: auto_release
        uses: actions/github-script@v7
        with:
          script: |
            const { pathToFileURL } = await import('node:url');
            const helperUrl = pathToFileURL(
              `${process.env.GITHUB_WORKSPACE}/tooling/scripts/auto-release-pr.mjs`
            ).href;
            const { hasChangesetFile, isAutoReleaseChecked } = await import(helperUrl);

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumbers = new Set();

            const { data: associatedPullRequests } =
              await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner,
                repo,
                commit_sha: context.sha,
              });

            for (const pullRequest of associatedPullRequests) {
              pullNumbers.add(pullRequest.number);
            }

            const headCommitMessage = context.payload.head_commit?.message ?? '';
            for (const match of headCommitMessage.matchAll(/\(#(\d+)\)|#(\d+)/g)) {
              const pullNumber = Number(match[1] ?? match[2]);

              if (pullNumber) pullNumbers.add(pullNumber);
            }

            for (const pullNumber of pullNumbers) {
              let pullRequest;

              try {
                const { data } = await github.rest.pulls.get({
                  owner,
                  repo,
                  pull_number: pullNumber,
                });

                pullRequest = data;
              } catch (error) {
                core.warning(`Could not read PR #${pullNumber}: ${error.message}`);
                continue;
              }

              if (!pullRequest.merged_at) {
                core.info(`Skipping PR #${pullRequest.number}; it is not merged.`);
                continue;
              }

              if (!isAutoReleaseChecked(pullRequest.body ?? '')) {
                core.info(`Skipping PR #${pullRequest.number}; auto-release is unchecked.`);
                continue;
              }

              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner,
                repo,
                pull_number: pullRequest.number,
                per_page: 100,
              });

              if (!hasChangesetFile(files)) {
                core.info(`Skipping PR #${pullRequest.number}; no changeset file found.`);
                continue;
              }

              core.setOutput('enabled', 'true');
              core.setOutput('source_pr', String(pullRequest.number));
              core.notice(`Auto-release enabled by PR #${pullRequest.number}.`);
              return;
            }

            core.setOutput('enabled', 'false');

      - name: ♻️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📦 Monorepo install
        uses: ./.github/actions/pnpm-install
        with:
          link-workspace-packages: 'true'

      - name: 🧩 Prepare release changesets
        run: node tooling/scripts/prepare-release-changesets.mjs

      - name: 🦋 Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          cwd: ${{ github.workspace }}
          title: '[Release] Version packages'
          publish: pnpm release
        env:
          HOME: ${{ github.workspace }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.API_TOKEN_GITHUB || secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: 🤖 Merge Version Packages PR
        if: ${{ steps.auto_release.outputs.enabled == 'true' && steps.changesets.outputs.pullRequestNumber != '' }}
        env:
          GH_TOKEN: ${{ secrets.API_TOKEN_GITHUB }}
          RELEASE_PR: ${{ steps.changesets.outputs.pullRequestNumber }}
          SOURCE_PR: ${{ steps.auto_release.outputs.source_pr }}
        run: |
          if [[ -z "${GH_TOKEN}" ]]; then
            echo "API_TOKEN_GITHUB is required so the merged release PR can trigger publish workflows."
            exit 1
          fi

          gh pr comment "$RELEASE_PR" --body "Merging because PR #${SOURCE_PR} checked auto release."
          gh pr merge "$RELEASE_PR" --squash --delete-branch --admin

  sync-release-artifacts:
    name: Sync registry and templates after publish
    runs-on: ubuntu-latest
    needs: release
    if: ${{ needs.release.result == 'success' && needs.release.outputs.published == 'true' }}

    steps:
      - name: 📥 Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.API_TOKEN_GITHUB || secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: 📥 Monorepo install
        uses: ./.github/actions/pnpm-install

      - name: ♻️ Restore packages cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache
            ${{ github.workspace }}/**/tsconfig.tsbuildinfo
          key: packages-cache-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - name: 🧱 Generate barrels
        run: pnpm brl

      - name: 🔍 Detect barrel changes
        id: barrel-changes
        run: |
          if [[ -n "$(git status --porcelain --untracked-files=all -- packages)" ]]; then
            git status --short -- packages
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: ❌ Fail on barrel drift in PR
        if: ${{ github.event_name == 'pull_request' && steps.barrel-changes.outputs.changed == 'true' }}
        run: |
          echo "pnpm brl produced changes. Commit the generated barrel updates."
          exit 1

      - name: ✅ Check
        run: bun check

      - name: 🔧 Configure git
        if: ${{ github.event_name == 'push' && steps.barrel-changes.outputs.changed == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: ⬆️ Push barrel updates
        if: ${{ github.event_name == 'push' && steps.barrel-changes.outputs.changed == 'true' }}
        run: |
          git add packages
          git commit -m "chore: sync barrels [skip ci] [skip release]"
          git push origin HEAD:${{ github.ref_name }}

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: ci
    timeout-minutes: 15
    if: >-
      always() &&
      github.ref == 'refs/heads/main' &&
      (needs.ci.result == 'success' || needs.ci.result == 'skipped') &&
      (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip release]'))
      )

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if release is needed
        id: check
        run: |
          CHANGESETS=$(find .changeset -name "*.md" ! -name "README.md" 2>/dev/null | wc -l)
          IS_VERSION_COMMIT=false
          if [[ "${{ github.event.head_commit.message }}" == "Version Packages"* ]]; then
            IS_VERSION_COMMIT=true
          fi
          IS_MANUAL=${{ github.event_name == 'workflow_dispatch' }}

          if [[ "$CHANGESETS" -gt 0 ]] || [[ "$IS_VERSION_COMMIT" == "true" ]] || [[ "$IS_MANUAL" == "true" ]]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "Release needed: changesets=$CHANGESETS version_commit=$IS_VERSION_COMMIT manual=$IS_MANUAL"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "No changesets, not a version commit, not manual — skipping release"
          fi

      - name: Setup git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
        env:
          HUSKY: '0'

      - name: Convert upstream changesets
        run: node scripts/convert-changesets.mjs

      - name: Build
        run: pnpm turbo build --filter "./packages/**"

      - name: Create Release Pull Request or Publish
        if: steps.check.outputs.needed == 'true'
        id: changesets
        uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          createGithubReleases: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"

      - name: Create GitHub Release
        if: steps.changesets.outputs.published == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGES='${{ steps.changesets.outputs.publishedPackages }}'
          VERSION=$(echo "$PACKAGES" | jq -r '.[0].version')
          TAG="v${VERSION}"

          BODY="## Published packages\n\n"
          BODY+=$(echo "$PACKAGES" | jq -r '.[] | "- \(.name)@\(.version)"')

          git tag "$TAG" 2>/dev/null || true
          git push origin "$TAG" 2>/dev/null || true

          gh release create "$TAG" \
            --title "$TAG" \
            --notes "$(echo -e "$BODY")" \
            --latest 2>/dev/null || \
          gh release edit "$TAG" \
            --title "$TAG" \
            --notes "$(echo -e "$BODY")"
